get:
  summary: Get microcredentials by course ID
  description: Get microcredentials by course ID
  operationId: get-microcredentials-course-id
  security: [ ]
  tags:
    - get-microcredentials-course-id
  parameters:
    - name: courseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    '200':
      description: List of microcredentials for the given course
      content:
        application/json:
          schema:
            $ref: '../components/responses/GetCourseMicrocredentialsResponse.yaml'
    '401':
      $ref: '../microcredential-api.yaml#/components/responses/401'
    '404':
      $ref: '../microcredential-api.yaml#/components/responses/404'
    '500':
      $ref: '../microcredential-api.yaml#/components/responses/500'
