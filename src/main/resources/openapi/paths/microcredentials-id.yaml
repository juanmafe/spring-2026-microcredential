get:
  summary: Get microcredential by ID
  description: Get microcredential by ID
  operationId: get-microcredentials-id
  security: [ ]
  tags:
    - get-microcredentials-id
  parameters:
    - name: microcredentialId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    '200':
      description: Microcredential found
      content:
        application/json:
          schema:
            $ref: '../components/responses/GetMicrocredentialIdResponse.yaml'
    '401':
      $ref: '../microcredential-api.yaml#/components/responses/401'
    '404':
      $ref: '../microcredential-api.yaml#/components/responses/404'
    '500':
      $ref: '../microcredential-api.yaml#/components/responses/500'
