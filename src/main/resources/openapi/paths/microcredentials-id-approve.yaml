patch:
  summary: Approve a pending microcredential
  description: Approve a pending microcredential
  operationId: patch-microcredentials-id-approve
  security: [ ]
  tags:
    - patch-microcredentials-id-approve
  parameters:
    - name: microcredentialId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    '200':
      description: Microcredential successfully approved
      content:
        application/json:
          schema:
            $ref: '../components/responses/ApproveMicrocredentialIdResponse.yaml'
    '400':
      $ref: '../microcredential-api.yaml#/components/responses/400'
    '401':
      $ref: '../microcredential-api.yaml#/components/responses/401'
    '404':
      $ref: '../microcredential-api.yaml#/components/responses/404'
    '500':
      $ref: '../microcredential-api.yaml#/components/responses/500'
