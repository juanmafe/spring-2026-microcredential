post:
  summary: Request a new microcredential
  description: Create a new microcredential
  operationId: post-microcredentials
  security: [ ]
  tags:
    - post-microcredentials
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/requests/CreateMicrocredentialRequest.yaml'
  responses:
    '201':
      description: Microcredential successfully requested
      content:
        application/json:
          schema:
            $ref: '../components/responses/CreateMicrocredentialResponse.yaml'
    '400':
      $ref: '../microcredential-api.yaml#/components/responses/400'
    '401':
      $ref: '../microcredential-api.yaml#/components/responses/401'
    '500':
      $ref: '../microcredential-api.yaml#/components/responses/500'
