patch:
  summary: Reject a pending microcredential
  description: Reject a pending microcredential
  operationId: patch-microcredentials-id-reject
  security: [ ]
  tags:
    - patch-microcredentials-id-reject
  parameters:
    - name: microcredentialId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    '200':
      description: Microcredential successfully rejected
      content:
        application/json:
          schema:
            $ref: '../components/responses/RejectMicrocredentialIdResponse.yaml'
    '400':
      $ref: '../microcredential-api.yaml#/components/responses/400'
    '401':
      $ref: '../microcredential-api.yaml#/components/responses/401'
    '404':
      $ref: '../microcredential-api.yaml#/components/responses/404'
    '500':
      $ref: '../microcredential-api.yaml#/components/responses/500'
